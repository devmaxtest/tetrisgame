server {
    listen 80;
    server_name tetrisgame.ulyssepro.org;
    root /var/www/apps/tetrisgame;
    index index.html;

    access_log /var/log/nginx/tetrisgame.access.log;
    error_log /var/log/nginx/tetrisgame.error.log;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss image/svg+xml application/wasm font/woff font/woff2;
    gzip_min_length 256;

    location ~ \. {
        deny all; 
        return 404;
    }
    location ~* \.(env|gitignore|DS_Store|htaccess|htpasswd|log|bak|sql|conf|ini|yml|yaml|toml|lock|ts|tsx|jsx)$ {
        deny all; 
        return 404;
    }
    
    location / {
        try_files $uri $uri/ /index.html =404;
    }
    
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }
    
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "frame-ancestors 'self' https://ulysseproject.org https://*.ulysseproject.org https://ulyssepro.org https://*.ulyssepro.org" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
} 

server {
    listen 443 ssl http2;
    server_name tetrisgame.ulyssepro.org;

    ssl_certificate /etc/ssl/certs/ulysse.crt;
    ssl_certificate_key /etc/ssl/private/ulysse.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /var/www/apps/tetrisgame;
    index index.html;

    access_log /var/log/nginx/tetrisgame.access.log;
    error_log /var/log/nginx/tetrisgame.error.log;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss image/svg+xml application/wasm font/woff font/woff2;
    gzip_min_length 256;

    location ~ \. {
        deny all; 
        return 404;
    }
    location ~* \.(env|gitignore|DS_Store|htaccess|htpasswd|log|bak|sql|conf|ini|yml|yaml|toml|lock|ts|tsx|jsx)$ {
        deny all; 
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.html =404;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
    }

    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "frame-ancestors 'self' https://ulysseproject.org https://*.ulysseproject.org https://ulyssepro.org https://*.ulyssepro.org" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}